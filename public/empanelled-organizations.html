    <!-- Scroll Progress Bar JavaScript -->
    <script>
        // Scroll Progress Bar Functionality
        document.addEventListener('DOMContentLoaded', function() {
            const scrollProgress = document.getElementById('scrollProgress');
            const scrollProgressBar = document.getElementById('scrollProgressBar');
            
            // Update scroll progress
            function updateScrollProgress() {
                const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrollPercentage = (scrollTop / scrollHeight) * 100;
                
                // Update progress bar width
                scrollProgressBar.style.width = scrollPercentage + '%';
                
                // Show/hide progress bar based on scroll position
                if (scrollTop > 100) {
                    scrollProgress.classList.remove('hidden');
                } else {
                    scrollProgress.classList.add('hidden');
                }
            }
            
            // Throttle function for performance
            function throttle(func, limit) {
                let inThrottle;
                return function() {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                }
            }
            
            // Add scroll event listener with throttling
            window.addEventListener('scroll', throttle(updateScrollProgress, 10));
            
            // Initial update
            updateScrollProgress();
            
            // Smooth scroll to top when progress bar is clicked
            scrollProgress.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // Add hover effect for progress bar
            scrollProgress.addEventListener('mouseenter', function() {
                scrollProgressBar.style.boxShadow = '0 0 20px rgba(202, 138, 4, 0.8)';
            });
            
            scrollProgress.addEventListener('mouseleave', function() {
                scrollProgressBar.style.boxShadow = '0 0 10px rgba(202, 138, 4, 0.5)';
            });
        });
    </script>
