        /* custom smooth animations & enhancements */
        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-40px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(40px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-on-scroll {
            opacity: 0;
            /* hidden until animation plays */
            animation-duration: 0.8s;
            animation-timing-function: cubic-bezier(0.2, 0.9, 0.3, 1);
            animation-fill-mode: forwards;
            animation-play-state: paused;
        }

        .animate-slideInLeft {
            animation-name: slideInLeft;
        }

        .animate-slideInRight {
            animation-name: slideInRight;
        }

        /* modern blur effect for modal */
        .backdrop-blur-custom {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Scroll Progress Bar Styles */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .scroll-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4d01 0%, #eab308 50%, #facc15 100%);
            border-radius: 0 1px 1px 0;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 10px rgba(202, 138, 4, 0.5);
        }


        .scroll-progress.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* image hover glass effect */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 20px 30px -10px rgba(0, 20, 30, 0.15);
            transition: all 0.4s ease;
            background: linear-gradient(45deg, #fbbf24, #dc2626, #fbbf24);
            padding: 3px;
        }

        .gallery-item img {
            transition: transform 0.7s ease, filter 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.06);
            filter: brightness(1.02) contrast(1.02);
        }

        .gallery-item::after {
            content: "🔍";
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: #1e3a8a;
            pointer-events: none;
            font-weight: 500;
        }

        .gallery-item:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        /* navbar placeholder (will be replaced by script) */
        #navbar-container {
            min-height: 70px;
        }

        /* hero image reduced height & professional overlay */
        .hero-infra {
            height: 68vh !important;

            min-height: 420px;

        @media (max-width: 768px) {

        .hero-overlay-text {

            }

        /* title underline shimmer */

        }

            }

    <script>
        // ========== MODAL FUNCTIONS ==========
        function openModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            if (modal && modalImg) {
                modalImg.src = imageSrc;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            if (modal) {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        // Escape key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // ========== SCROLL ANIMATIONS ==========
        function initScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '50px' });

            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                observer.observe(el);
            });
        }

        // ========== LAZY LOADING ==========
        function initLazyLoading() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '100px' });

            document.querySelectorAll('.gallery-item img').forEach(img => {
                img.style.opacity = '0';
                img.style.transition = 'opacity 0.5s ease-in-out';
                observer.observe(img);
            });
        }

        // ========== MOBILE DROPDOWN TOGGLE ==========
        window.toggleMobileDropdown = function (dropdownId) {
            const dropdown = document.getElementById(dropdownId + '-dropdown');
            const button = event.currentTarget;
            const chevron = button.querySelector('i');

            if (dropdown) {
                // Close all other dropdowns
                document.querySelectorAll('[id$="-dropdown"]').forEach(d => {
                    if (d.id !== dropdownId + '-dropdown' && !d.classList.contains('hidden')) {
                        d.classList.add('hidden');
                        const otherBtn = d.previousElementSibling;
                        if (otherBtn) {
                            const otherChevron = otherBtn.querySelector('i');
                            if (otherChevron) otherChevron.style.transform = 'rotate(0deg)';
                        }
                    }
                });

                // Toggle current dropdown
                if (dropdown.classList.contains('hidden')) {
                    dropdown.classList.remove('hidden');
                    if (chevron) chevron.style.transform = 'rotate(180deg)';
                } else {
                    dropdown.classList.add('hidden');
                    if (chevron) chevron.style.transform = 'rotate(0deg)';
                }
            }
        };

        // ========== MOBILE MENU FUNCTIONALITY ==========
        function initializeMobileMenu() {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            if (mobileMenuButton && mobileMenu) {
                // Remove existing listeners
                const newButton = mobileMenuButton.cloneNode(true);
                mobileMenuButton.parentNode.replaceChild(newButton, mobileMenuButton);

                newButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    mobileMenu.classList.toggle('hidden');

                    // Toggle icon between bars and times
                    const icon = newButton.querySelector('i');
                    if (icon) {
                        if (mobileMenu.classList.contains('hidden')) {
                            icon.className = 'fas fa-bars';
                            document.body.classList.remove('mobile-menu-open');
                        } else {
                            icon.className = 'fas fa-times';
                            document.body.classList.add('mobile-menu-open');
                        }
                    }
                });

                // Close on link click
                mobileMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenu.classList.add('hidden');
                        document.body.classList.remove('mobile-menu-open');
                        const icon = newButton.querySelector('i');
                        if (icon) icon.className = 'fas fa-bars';
                    });
                });

                // Close on outside click
                document.addEventListener('click', (e) => {
                    if (mobileMenu && !mobileMenu.classList.contains('hidden') &&
                        !mobileMenu.contains(e.target) && !newButton.contains(e.target)) {
                        mobileMenu.classList.add('hidden');
                        document.body.classList.remove('mobile-menu-open');
                        const icon = newButton.querySelector('i');
                        if (icon) icon.className = 'fas fa-bars';
                    }
                });
            }
        }

                                    </div>
                                </div>

        // Scroll Progress Bar Functionality
        document.addEventListener('DOMContentLoaded', function () {
            const scrollProgress = document.getElementById('scrollProgress');
            const scrollProgressBar = document.getElementById('scrollProgressBar');

            // Update scroll progress
            function updateScrollProgress() {
                const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrollPercentage = (scrollTop / scrollHeight) * 100;

                // Update progress bar width
                scrollProgressBar.style.width = scrollPercentage + '%';

                // Show/hide progress bar based on scroll position
                if (scrollTop > 100) {
                    scrollProgress.classList.remove('hidden');
                } else {
                    scrollProgress.classList.add('hidden');
                }
            }

            // Throttle function for performance
            function throttle(func, limit) {
                let inThrottle;
                return function () {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                }
            }

            // Add scroll event listener with throttling
            window.addEventListener('scroll', throttle(updateScrollProgress, 10));

            // Initial update
            updateScrollProgress();

            // Smooth scroll to top when progress bar is clicked
            scrollProgress.addEventListener('click', function () {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // Add hover effect for progress bar
            scrollProgress.addEventListener('mouseenter', function () {
                scrollProgressBar.style.boxShadow = '0 0 20px rgba(202, 138, 4, 0.8)';
            });

            scrollProgress.addEventListener('mouseleave', function () {
                scrollProgressBar.style.boxShadow = '0 0 10px rgba(202, 138, 4, 0.5)';
            });
        });

        // ========== INITIALIZE EVERYTHING ==========
        window.addEventListener('DOMContentLoaded', () => {
            loadNavbar();
